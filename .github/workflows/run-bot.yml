name: Crypto Signal Bot 24/7 with State Handoff

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'  # Every 5 hours
  push:
    branches: [main]

jobs:
  bot-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout with state
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Load previous state
        id: state
        run: |
          if [ -f bot_state.json ]; then
            echo "📂 Previous state found!"
            cat bot_state.json | python -m json.tool
            echo "RESTART=true" >> $GITHUB_ENV
          else
            echo "🆕 Fresh start!"
            echo "RESTART=false" >> $GITHUB_ENV
          fi

      - name: Create .env file
        run: |
          if [ "$RESTART" = "true" ]; then
            HISTORY_LIMIT=50
          else
            HISTORY_LIMIT=5000
          fi
          
          cat > .env << 'ENVEOF'
          TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE=${{ secrets.TELEGRAM_PHONE }}
          TELEGRAM_CHANNELS=${{ secrets.TELEGRAM_CHANNELS }}
          TELEGRAM_HISTORY_LIMIT=${HISTORY_LIMIT}
          TELEGRAM_HISTORY_LIMIT_RESTART=50
          BINANCE_API_KEY=${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET=${{ secrets.BINANCE_API_SECRET }}
          BINANCE_TESTNET=true
          NOTIFY_TELEGRAM_BOT_TOKEN=${{ secrets.NOTIFY_TELEGRAM_BOT_TOKEN }}
          NOTIFY_TELEGRAM_CHAT_ID=${{ secrets.NOTIFY_TELEGRAM_CHAT_ID }}
          NOTIFY_DISCORD_WEBHOOK=${{ secrets.NOTIFY_DISCORD_WEBHOOK }}
          DRY_RUN=true
          LOG_LEVEL=INFO
          ENVEOF

      - name: Restore Telegram session from secret
        run: |
          if [ ! -z "${{ secrets.TELEGRAM_SESSION_B64 }}" ]; then
            mkdir -p data
            echo "${{ secrets.TELEGRAM_SESSION_B64 }}" | base64 -d > data/telegram_session
            echo "✅ Session restored from secret"
          else
            echo "⚠️  TELEGRAM_SESSION_B64 secret not set yet"
            echo "Please run setup_session.py locally first and add the secret"
          fi

      - name: Run bot with handoff
        run: |
          echo "🤖 Starting bot..."
          python main.py
          
          # Save final state
          echo "💾 Saving final state for next run..."

      - name: Generate base64 session string (if created)
        if: always()
        run: |
          mkdir -p session_artifacts
          
          if [ -f data/telegram_session ]; then
            echo "✅ Session file found!"
            
            # Generate base64 encoded session
            SESSION_B64=$(base64 -w 0 data/telegram_session)
            
            # Save to file for easy copying
            echo "$SESSION_B64" > session_artifacts/TELEGRAM_SESSION_B64.txt
            
            echo "📝 Session base64 generated and saved"
            echo "Base64 length: ${#SESSION_B64} characters"
            
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "🎯 TELEGRAM SESSION BASE64"
            echo "════════════════════════════════════════════════════════"
            cat session_artifacts/TELEGRAM_SESSION_B64.txt
            echo ""
            echo "════════════════════════════════════════════════════════"
          else
            echo "ℹ️  No session file found (this is expected on first run)"
            echo "Session file: data/telegram_session"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-session-setup-${{ github.run_number }}
          path: |
            session_artifacts/
          retention-days: 30

      - name: Commit state for next run
        if: always()
        run: |
          if [ -f bot_state.json ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # Pull latest to avoid conflicts
            git pull --rebase
            
            # Stage state and logs
            git add bot_state.json logs/ *.log 2>/dev/null || true
            
            # Only commit if changes exist
            if git diff --staged --quiet; then
              echo "No state changes to commit"
            else
              git commit -m "🔄 State handoff: $(date -u +'%Y-%m-%d %H:%M UTC')"
              git push
              echo "✅ State saved for next run!"
            fi
          fi

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-run-${{ github.run_number }}
          path: |
            logs/
            bot_state.json
            *.log
          retention-days: 7
